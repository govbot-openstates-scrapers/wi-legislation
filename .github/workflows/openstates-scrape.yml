name: OpenStates Scrape for wi

on:
  # Staggered by the state capital's timezone (see locale.scrape_cron in
  # chn-openstates-scrape.yml) so each state scrapes shortly after its own
  # legislative day ends, instead of every state firing at the same UTC
  # instant regardless of local time -- previously that meant western states
  # were effectively scraped in their own early evening/late night.
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      force-update:
        type: boolean
        description: "Force push even if upstream changed (use with caution)"
        default: false
      use-self-hosted:
        type: boolean
        description: "Force self-hosted for this manual run instead of the default tinyproxy + GitHub-hosted path (only meaningful for locales configured runner: self-hosted; e.g. to test without the proxy)"
        default: false

env:
  STATE_CODE: wi
  # locale.runner is a render-time literal ("self-hosted" or "ubuntu-latest"),
  # not a runtime value -- runs-on: and this env: block can't read each other
  # or their own sibling keys, so the literal gets inlined directly wherever
  # it's needed below instead of routed through a shared variable.
  #
  # inputs.use-self-hosted only ever populates on a workflow_dispatch event --
  # it's simply unset (falsy) on the nightly `schedule` trigger regardless of
  # its declared default, so a plain `inputs.use-self-hosted` check would only
  # ever fire on a manual run. For a self-hosted-flagged locale, route through
  # tinyproxy on a GitHub-hosted runner by default and treat self-hosted as an
  # explicit manual opt-out -- proxy running unattended was the whole point;
  # self-hosted alone silently depended on a laptop being on and connected for
  # every single automatic run. Locales that were never self-hosted (the
  # literal below is "ubuntu-latest") are untouched by any of this.
  USE_PROXY: ${{ 'ubuntu-latest' == 'self-hosted' && !(github.event_name == 'workflow_dispatch' && inputs.use-self-hosted) }}

jobs:
  scrape:
    name: "🕷️ Scrape Data"
    runs-on: ${{ (github.event_name == 'workflow_dispatch' && inputs.use-self-hosted) && 'self-hosted' || ('ubuntu-latest' == 'self-hosted' && 'ubuntu-latest' || 'ubuntu-latest') }}
    timeout-minutes: 720
    permissions:
      contents: write

    steps:
      - name: Checkout state repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run scraper action
        id: scrape
        uses: chihacknight/govbot/actions/scrape@main
        with:
          state: ${{ env.STATE_CODE }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          commit-and-push: true
          force-update: ${{ inputs.force-update }}
          branch: main
          api-keys: |
            {
              "DC_API_KEY": "${{ secrets.DC_API_KEY }}",
              "NEW_YORK_API_KEY": "${{ secrets.NEW_YORK_API_KEY }}",
              "INDIANA_API_KEY": "${{ secrets.INDIANA_API_KEY }}",
              "USER_AGENT": "${{ secrets.USER_AGENT }}",
              "HTTPS_PROXY": "${{ env.USE_PROXY == 'true' && secrets.PROXY_URL || '' }}",
              "HTTP_PROXY": "${{ env.USE_PROXY == 'true' && secrets.PROXY_URL || '' }}"
            }

      # Cross-org trigger: scrape and format live in different orgs
      # (govbot-openstates-scrapers / govbot-data), so workflow_run can't
      # chain them -- it only works within a single repo. repository_dispatch
      # is the primitive for this, authenticated via a short-lived GitHub App
      # installation token instead of a long-lived PAT (the previous version
      # of this dispatch died silently when its PAT expired -- see project
      # notes). Always runs, even if the scrape step above failed: format's
      # own SHA-staleness check already makes a no-op trigger cheap (~10s),
      # so there's no cost to triggering unconditionally, and states that
      # degrade gracefully (out-of-session, partial data) still deserve a
      # fresh format pass over whatever did land.
      - name: Generate GitHub App token for cross-org dispatch
        id: app-token
        if: always()
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: govbot-data
          repositories: ${{ env.STATE_CODE }}-legislation

      - name: Trigger format workflow in govbot-data
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          echo "🚀 Triggering format workflow for ${{ env.STATE_CODE }} in govbot-data..."
          gh api "repos/govbot-data/${{ env.STATE_CODE }}-legislation/dispatches" \
            -f event_type='scrape-complete' \
            -F "client_payload[state]=${{ env.STATE_CODE }}"
